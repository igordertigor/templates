services:
  postgres:
    image: postgres:{{ cookiecutter.postgres_version }}
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?required}
      POSTGRES_DB: ${POSTGRES_DB:-{{ cookiecutter.project_slug }}}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      {% if cookiecutter.shared_db == "y" %}
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
      {% endif %}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  {% if cookiecutter.shared_db == "n" %}
  postgres-authentik:
    image: postgres:{{ cookiecutter.postgres_version }}-alpine
    environment:
      POSTGRES_USER: ${AUTHENTIK_POSTGRES_USER:-authentik}
      POSTGRES_PASSWORD: ${AUTHENTIK_POSTGRES_PASSWORD:?required}
      POSTGRES_DB: authentik
    volumes:
      - postgres_authentik_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AUTHENTIK_POSTGRES_USER:-authentik}"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
  {% endif %}

  authentik-server:
    image: ${AUTHENTIK_IMAGE:-ghcr.io/goauthentik/server}:${AUTHENTIK_TAG:-2026.2.2}
    restart: unless-stopped
    command: server
    environment:
      {% if cookiecutter.shared_db == "y" %}
      AUTHENTIK_POSTGRESQL__HOST: postgres
      AUTHENTIK_POSTGRESQL__NAME: authentik
      AUTHENTIK_POSTGRESQL__USER: ${POSTGRES_USER:-postgres}
      AUTHENTIK_POSTGRESQL__PASSWORD: ${POSTGRES_PASSWORD}
      {% else %}
      AUTHENTIK_POSTGRESQL__HOST: postgres-authentik
      AUTHENTIK_POSTGRESQL__NAME: authentik
      AUTHENTIK_POSTGRESQL__USER: ${AUTHENTIK_POSTGRES_USER:-authentik}
      AUTHENTIK_POSTGRESQL__PASSWORD: ${AUTHENTIK_POSTGRES_PASSWORD}
      {% endif %}
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY:?required}
      AUTHENTIK_ERROR_REPORTING__ENABLED: ${AUTHENTIK_ERROR_REPORTING__ENABLED:-false}
      # Blueprint variables
      AUTHENTIK_CLIENT_ID: ${AUTHENTIK_CLIENT_ID:-}
    volumes:
      - authentik_media:/media
      - authentik_templates:/templates
      - ./docker/authentik-blueprints:/blueprints/custom:ro
    ports:
      - "${AUTHENTIK_PORT_HTTP:-8080}:9000"
      - "${AUTHENTIK_PORT_HTTPS:-8443}:9443"
    depends_on:
      {% if cookiecutter.shared_db == "y" %}
      postgres:
        condition: service_healthy
      {% else %}
      postgres-authentik:
        condition: service_healthy
      {% endif %}

  authentik-worker:
    image: ${AUTHENTIK_IMAGE:-ghcr.io/goauthentik/server}:${AUTHENTIK_TAG:-2026.2.2}
    restart: unless-stopped
    command: worker
    environment:
      {% if cookiecutter.shared_db == "y" %}
      AUTHENTIK_POSTGRESQL__HOST: postgres
      AUTHENTIK_POSTGRESQL__NAME: authentik
      AUTHENTIK_POSTGRESQL__USER: ${POSTGRES_USER:-postgres}
      AUTHENTIK_POSTGRESQL__PASSWORD: ${POSTGRES_PASSWORD}
      {% else %}
      AUTHENTIK_POSTGRESQL__HOST: postgres-authentik
      AUTHENTIK_POSTGRESQL__NAME: authentik
      AUTHENTIK_POSTGRESQL__USER: ${AUTHENTIK_POSTGRES_USER:-authentik}
      AUTHENTIK_POSTGRESQL__PASSWORD: ${AUTHENTIK_POSTGRES_PASSWORD}
      {% endif %}
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY}
      AUTHENTIK_ERROR_REPORTING__ENABLED: ${AUTHENTIK_ERROR_REPORTING__ENABLED:-false}
      # Blueprint variables
      AUTHENTIK_CLIENT_ID: ${AUTHENTIK_CLIENT_ID:-}
    user: root
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - authentik_media:/media
      - authentik_certs:/certs
      - authentik_templates:/templates
      - ./docker/authentik-blueprints:/blueprints/custom:ro
    depends_on:
      {% if cookiecutter.shared_db == "y" %}
      postgres:
        condition: service_healthy
      {% else %}
      postgres-authentik:
        condition: service_healthy
      {% endif %}

  {% if cookiecutter.add_arq == "y" %}
  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
  {% endif %}

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?required}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      target: dev
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-{{ cookiecutter.project_slug }}}
      {% if cookiecutter.add_arq == "y" %}
      REDIS_URL: redis://redis:6379
      {% endif %}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      AUTHENTIK_ISSUER: http://authentik-server:9000/application/o/{{ cookiecutter.project_slug }}/
      AUTHENTIK_CLIENT_ID: ${AUTHENTIK_CLIENT_ID:-}
    develop:
      watch:
        - action: sync
          path: ./backend/app
          target: /app/app
        - action: sync
          path: ./backend/migrations
          target: /app/migrations
        - action: sync
          path: ./backend/alembic.ini
          target: /app/alembic.ini
        - action: sync+restart
          path: ./backend/pyproject.toml
          target: /app/pyproject.toml
        - action: rebuild
          path: ./backend/uv.lock
          target: /app/uv.lock
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      {% if cookiecutter.add_arq == "y" %}
      redis:
        condition: service_healthy
      {% endif %}

  {% if cookiecutter.add_arq == "y" %}
  worker:
    build:
      context: ./backend
      target: dev
    command: uv run arq app.worker.settings.WorkerSettings
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-{{ cookiecutter.project_slug }}}
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      AUTHENTIK_ISSUER: http://authentik-server:9000/application/o/{{ cookiecutter.project_slug }}/
    develop:
      watch:
        - action: sync
          path: ./backend/app
          target: /app/app
        - action: sync
          path: ./backend/migrations
          target: /app/migrations
        - action: sync
          path: ./backend/alembic.ini
          target: /app/alembic.ini
        - action: sync+restart
          path: ./backend/pyproject.toml
          target: /app/pyproject.toml
        - action: rebuild
          path: ./backend/uv.lock
          target: /app/uv.lock
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
  {% endif %}

  {% if cookiecutter.add_frontend == "y" %}
  frontend:
    build:
      context: ./frontend
      target: dev
    develop:
      watch:
        - action: sync
          path: ./frontend/src
          target: /app/src
        - action: sync
          path: ./frontend/index.html
          target: /app/index.html
        - action: sync
          path: ./frontend/vite.config.ts
          target: /app/vite.config.ts
        - action: sync
          path: ./frontend/tsconfig.json
          target: /app/tsconfig.json
        - action: sync
          path: ./frontend/tsconfig.app.json
          target: /app/tsconfig.app.json
        - action: sync
          path: ./frontend/tsconfig.node.json
          target: /app/tsconfig.node.json
        {% if cookiecutter.add_strawberry == "y" %}
        - action: sync
          path: ./frontend/codegen.ts
          target: /app/codegen.ts
        {% endif %}
        - action: sync+restart
          path: ./frontend/package.json
          target: /app/package.json
        - action: rebuild
          path: ./frontend/pnpm-lock.yaml
          target: /app/pnpm-lock.yaml
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000
      VITE_AUTHENTIK_ISSUER: http://localhost:8080/application/o/{{ cookiecutter.project_slug }}/
      VITE_AUTHENTIK_CLIENT_ID: ${AUTHENTIK_CLIENT_ID:-}
  {% endif %}

volumes:
  postgres_data:
  {% if cookiecutter.shared_db == "n" %}
  postgres_authentik_data:
  {% endif %}
  {% if cookiecutter.add_arq == "y" %}
  redis_data:
  {% endif %}
  minio_data:
  authentik_media:
  authentik_templates:
  authentik_certs:
