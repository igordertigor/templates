services:
  postgres:
    image: postgres:{{ cookiecutter.postgres_version }}
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?required}
      POSTGRES_DB: ${POSTGRES_DB:-{{ cookiecutter.project_slug }}}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      {% if cookiecutter.shared_db == "y" %}
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
      {% endif %}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  {% if cookiecutter.shared_db == "n" %}
  postgres-zitadel:
    image: postgres:{{ cookiecutter.postgres_version }}
    environment:
      POSTGRES_USER: ${ZITADEL_POSTGRES_USER:-zitadel}
      POSTGRES_PASSWORD: ${ZITADEL_POSTGRES_PASSWORD:?required}
      POSTGRES_DB: zitadel
    volumes:
      - postgres_zitadel_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${ZITADEL_POSTGRES_USER:-zitadel}"]
      interval: 5s
      timeout: 5s
      retries: 5
  {% endif %}

  zitadel:
    image: ghcr.io/zitadel/zitadel:latest
    command: start-from-init --masterkey ${ZITADEL_MASTERKEY:?required} --tlsMode disabled
    environment:
      ZITADEL_DATABASE_POSTGRES_HOST: {% if cookiecutter.shared_db == "y" %}postgres{% else %}postgres-zitadel{% endif %}
      ZITADEL_DATABASE_POSTGRES_PORT: 5432
      ZITADEL_DATABASE_POSTGRES_DATABASE: {% if cookiecutter.shared_db == "y" %}zitadel{% else %}zitadel{% endif %}
      ZITADEL_DATABASE_POSTGRES_USER_USERNAME: {% if cookiecutter.shared_db == "y" %}${POSTGRES_USER:-postgres}{% else %}${ZITADEL_POSTGRES_USER:-zitadel}{% endif %}
      ZITADEL_DATABASE_POSTGRES_USER_PASSWORD: {% if cookiecutter.shared_db == "y" %}${POSTGRES_PASSWORD:?required}{% else %}${ZITADEL_POSTGRES_PASSWORD:?required}{% endif %}
      ZITADEL_DATABASE_POSTGRES_USER_SSL_MODE: disable
      ZITADEL_DATABASE_POSTGRES_ADMIN_USERNAME: {% if cookiecutter.shared_db == "y" %}${POSTGRES_USER:-postgres}{% else %}${ZITADEL_POSTGRES_USER:-zitadel}{% endif %}
      ZITADEL_DATABASE_POSTGRES_ADMIN_PASSWORD: {% if cookiecutter.shared_db == "y" %}${POSTGRES_PASSWORD:?required}{% else %}${ZITADEL_POSTGRES_PASSWORD:?required}{% endif %}
      ZITADEL_DATABASE_POSTGRES_ADMIN_SSL_MODE: disable
      ZITADEL_EXTERNALSECURE: "false"
      ZITADEL_EXTERNALPORT: 8080
      ZITADEL_EXTERNALDOMAIN: localhost
    depends_on:
      {% if cookiecutter.shared_db == "y" %}
      postgres:
        condition: service_healthy
      {% else %}
      postgres-zitadel:
        condition: service_healthy
      {% endif %}
    ports:
      - "8080:8080"

  {% if cookiecutter.add_arq == "y" %}
  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
  {% endif %}

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?required}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      target: dev
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-{{ cookiecutter.project_slug }}}
      {% if cookiecutter.add_arq == "y" %}
      REDIS_URL: redis://redis:6379
      {% endif %}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      ZITADEL_DOMAIN: http://localhost:8080
      ZITADEL_CLIENT_ID: ${ZITADEL_CLIENT_ID:-}
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      {% if cookiecutter.add_arq == "y" %}
      redis:
        condition: service_healthy
      {% endif %}

  {% if cookiecutter.add_arq == "y" %}
  worker:
    build:
      context: ./backend
      target: dev
    command: uv run arq app.worker.settings.WorkerSettings
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-{{ cookiecutter.project_slug }}}
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      ZITADEL_DOMAIN: http://localhost:8080
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
  {% endif %}

  {% if cookiecutter.add_frontend == "y" %}
  frontend:
    build:
      context: ./frontend
      target: dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000
      VITE_ZITADEL_DOMAIN: http://localhost:8080
      VITE_ZITADEL_CLIENT_ID: ${ZITADEL_CLIENT_ID:-}
  {% endif %}

volumes:
  postgres_data:
  {% if cookiecutter.shared_db == "n" %}
  postgres_zitadel_data:
  {% endif %}
  {% if cookiecutter.add_arq == "y" %}
  redis_data:
  {% endif %}
  minio_data:
