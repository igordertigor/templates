apiVersion: apps/v1
kind: Deployment
metadata:
  name: zitadel
spec:
  template:
    spec:
      containers:
        - name: zitadel
          env:
            - name: ZITADEL_EXTERNALDOMAIN
              value: "localhost"
            - name: ZITADEL_EXTERNALPORT
              value: "8080"
            - name: ZITADEL_EXTERNALSECURE
              value: "false"
