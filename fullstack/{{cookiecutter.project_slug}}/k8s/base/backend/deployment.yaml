apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  selector:
    matchLabels:
      app: backend
  replicas: 1
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: {{ cookiecutter.project_slug }}-backend:latest
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: database-url
            - name: ZITADEL_DOMAIN
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: zitadel-domain
            - name: ZITADEL_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: zitadel-client-id
            - name: MINIO_ENDPOINT
              value: minio:9000
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: access-key
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: secret-key
            {% if cookiecutter.add_arq == "y" %}
            - name: REDIS_URL
              value: redis://redis:6379
            {% endif %}
          ports:
            - containerPort: 8000
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: backend
spec:
  selector:
    app: backend
  ports:
    - port: 8000
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
data:
  # Patched per overlay
  zitadel-domain: "https://auth.example.com"
