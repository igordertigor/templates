apiVersion: apps/v1
kind: Deployment
metadata:
  name: authentik-server
spec:
  selector:
    matchLabels:
      app: authentik-server
  replicas: 1
  template:
    metadata:
      labels:
        app: authentik-server
    spec:
      containers:
        - name: authentik-server
          image: ghcr.io/goauthentik/server:2026.2.2
          command: ["server"]
          env:
            {% if cookiecutter.shared_db == "y" %}
            - name: AUTHENTIK_POSTGRESQL__HOST
              value: postgres
            - name: AUTHENTIK_POSTGRESQL__NAME
              value: authentik
            - name: AUTHENTIK_POSTGRESQL__USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: username
            - name: AUTHENTIK_POSTGRESQL__PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: password
            {% else %}
            - name: AUTHENTIK_POSTGRESQL__HOST
              value: postgres-authentik
            - name: AUTHENTIK_POSTGRESQL__NAME
              value: authentik
            - name: AUTHENTIK_POSTGRESQL__USER
              valueFrom:
                secretKeyRef:
                  name: authentik-postgres-secret
                  key: username
            - name: AUTHENTIK_POSTGRESQL__PASSWORD
              valueFrom:
                secretKeyRef:
                  name: authentik-postgres-secret
                  key: password
            {% endif %}
            - name: AUTHENTIK_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: authentik-secret
                  key: secret-key
            - name: AUTHENTIK_ERROR_REPORTING__ENABLED
              value: "false"
            # AUTHENTIK_CLIENT_ID can be set for blueprints
          ports:
            - name: http
              containerPort: 9000
            - name: https
              containerPort: 9443
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: apps/v1
kind: Deployment
